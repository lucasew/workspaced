# Warning: Do not unify this file with others. Keep tool definitions localized.
[tools]
go = "1.26.4"
"go:golang.org/x/tools/gopls" = "0.22.0"
goreleaser = "2.16.0"
svu = "3.4.1"
sqlc = "1.31.1"

[tasks.lint]
run = "go run ./cmd/workspaced codebase lint"

[tasks.format]
run = "go run ./cmd/workspaced codebase format"

[tasks."codegen:sqlc"]
description = "Generate Go code from SQL using sqlc"
run = "sqlc generate"

[tasks."codegen:autoregistry"]
description = "Regenerate cmd/workspaced/**/prelude.go files for CLI subcommand wiring"
run = "go run ./pkg/devtools/autoregistry"

[tasks.codegen]
description = "Run all code generators"
depends = ["codegen:*"]

[tasks.ci]
depends = ["lint"]

[tasks.release]
description = "Run a release"
depends = ["codegen", "ci"]
wait_for = ["codegen"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''
