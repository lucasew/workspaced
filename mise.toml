# Warning: Do not unify this file with others. Keep tool definitions localized.
[tools]
go = "1.26.4"
"go:golang.org/x/tools/gopls" = "0.23.0"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "2.12.2"
goreleaser = "2.17.0"
svu = "3.3.0"
sqlc = "1.31.1"

[tasks.lint]
run = "go run ./cmd/workspaced codebase lint --review"

[tasks.format]
run = "go run ./cmd/workspaced codebase format"

[tasks."codegen:sqlc"]
description = "Generate Go code from SQL using sqlc"
run = "sqlc generate"

[tasks."codegen:autoregistry"]
description = "Regenerate cmd/workspaced/**/prelude.go files for CLI subcommand wiring"
run = "go run ./internal/devtools/autoregistry"

[tasks.codegen]
description = "Run all code generators"
depends = ["codegen:*"]

[tasks.ci]
depends = ["lint"]

[tasks."test:registry-install"]
description = "Install each catalog tool into a temp dir and run install checks (network)"
env = { WORKSPACED_TEST_TOOL_INSTALL = "1" }
run = "go test -v ./internal/tool/backend/catalog/ -run '^TestRegistryInstall$' -count=1 -timeout=60m"

[tasks.release]
description = "Run a release"
depends = ["codegen", "ci", "test:registry-install"]
wait_for = ["codegen"]
usage = '''
arg "<version>" help="New version" {
  choices "next" "major" "minor" "patch"
  default "next"
}
'''
run = '''
git tag $(svu ${usage_version})
goreleaser release --clean
'''
